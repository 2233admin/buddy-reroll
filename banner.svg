<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9d423"/>
      <stop offset="100%" stop-color="#ff4e50"/>
    </linearGradient>
    <linearGradient id="shiny" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="50%" stop-color="#f5576c"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="16" fill="url(#bg)"/>

  <!-- Decorative dots (stars) -->
  <circle cx="50" cy="40" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="150" cy="25" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="250" cy="55" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="680" cy="35" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="750" cy="60" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="720" cy="20" r="1" fill="#fff" opacity="0.2"/>
  <circle cx="100" cy="250" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="600" cy="250" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="400" cy="30" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="500" cy="260" r="1" fill="#fff" opacity="0.2"/>

  <!-- Capybara ASCII art area -->
  <g transform="translate(60, 60)">
    <!-- Capybara body -->
    <rect x="0" y="0" width="160" height="160" rx="20" fill="#302b63" opacity="0.6" stroke="#f9d423" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Capybara face (cute pixel style) -->
    <text x="80" y="55" text-anchor="middle" font-family="monospace" font-size="14" fill="#a0a0c0" opacity="0.6">┌─────────┐</text>
    <text x="80" y="75" text-anchor="middle" font-family="monospace" font-size="14" fill="#a0a0c0" opacity="0.6">│ ◉   ◉ │</text>
    <text x="80" y="95" text-anchor="middle" font-family="monospace" font-size="14" fill="#a0a0c0" opacity="0.6">│  ═══  │</text>
    <text x="80" y="115" text-anchor="middle" font-family="monospace" font-size="14" fill="#a0a0c0" opacity="0.6">│  ‿‿‿  │</text>
    <text x="80" y="135" text-anchor="middle" font-family="monospace" font-size="14" fill="#a0a0c0" opacity="0.6">└─────────┘</text>

    <!-- Shiny sparkle -->
    <text x="140" y="30" font-size="18" filter="url(#starglow)" fill="#f9d423">✦</text>
  </g>

  <!-- Title -->
  <text x="280" y="105" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="48" fill="url(#gold)" filter="url(#glow)">buddy-reroll</text>

  <!-- Subtitle -->
  <text x="280" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="18" fill="#a0a0c0">Reroll your Claude Code <tspan fill="#f9d423">/buddy</tspan> pet</text>

  <!-- Stars row -->
  <g transform="translate(280, 160)" filter="url(#starglow)">
    <text x="0" y="20" font-size="22" fill="#f9d423">★</text>
    <text x="28" y="20" font-size="22" fill="#f9d423">★</text>
    <text x="56" y="20" font-size="22" fill="#f9d423">★</text>
    <text x="84" y="20" font-size="22" fill="#f9d423">★</text>
    <text x="112" y="20" font-size="22" fill="#f9d423">★</text>
    <text x="145" y="20" font-size="15" fill="#a0a0c0" font-family="'Segoe UI', system-ui, sans-serif">LEGENDARY</text>
  </g>

  <!-- Tags -->
  <g transform="translate(280, 205)">
    <rect x="0" y="0" width="56" height="24" rx="12" fill="#f9d423" opacity="0.15"/>
    <text x="28" y="16" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#f9d423" font-weight="600">Bun</text>

    <rect x="66" y="0" width="64" height="24" rx="12" fill="#f093fb" opacity="0.15"/>
    <text x="98" y="16" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#f093fb" font-weight="600">Shiny</text>

    <rect x="140" y="0" width="100" height="24" rx="12" fill="#4facfe" opacity="0.15"/>
    <text x="190" y="16" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4facfe" font-weight="600">18 Species</text>

    <rect x="250" y="0" width="100" height="24" rx="12" fill="#43e97b" opacity="0.15"/>
    <text x="300" y="16" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#43e97b" font-weight="600">5 Rarities</text>
  </g>
</svg>
